
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Institutions - DGN</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{font-family:Georgia,serif;margin:0;padding:40px;background:#f7f8fb;}
.container{max-width:1200px;margin:auto;}
#map{height:650px;border-radius:18px;box-shadow:0 8px 25px rgba(0,0,0,.12);}
</style>
</head>
<body>
<div class="container">
<h1>Institutions of the Divisorial Geometry Network</h1>
<p>The map below shows the participating institutions of the project.</p>

<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([-15,-52],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap contributors'
}).addTo(map);

var institutions = [
["UNIFAP",-0.0349,-51.0694],
["UFAL",-9.6658,-35.7353],
["UFPB",-7.1392,-34.8450],
["UFJ",-17.8794,-51.7204],
["USP/ICMC (São Carlos)",-22.0081,-47.8977],
["UNESP/IBILCE",-20.8197,-49.3794],
["UNESP/IGCE",-22.4114,-47.5616],
["UFABC",-23.6639,-46.5383],
["UFES",-20.2737,-40.3040],
["UFSCar",-21.9834,-47.8802],
["UFU",-18.9186,-48.2772],
["UEM",-23.4053,-51.9375]
];

institutions.forEach(function(inst){
    L.marker([inst[1],inst[2]])
     .addTo(map)
     .bindPopup("<b>"+inst[0]+"</b>");
});
</script>
</body>
</html>
